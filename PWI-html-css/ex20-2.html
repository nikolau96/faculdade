<!DOCTYPE html>
<html>
<head>
    <style>
        div{
            max-width: 500px;
            height: 100px;
            background-color: powderblue;
        }
    </style>
</head>
<body>
    <h3>Definindo max-width de um elemento</h3>
    <div>Essa div tem uma altura (height) de 100px e uma largura máxima (max-width) de 500px.</div>
    <p>Redimensione a janela do navegador para ver o efeito!</p>
</body>
</html>
