<!DOCTYPE html>
<html>
<head>
    <style>
        div{
            border: 1px solid black;
            margin-top: 100px;
            margin-right: 150px;
            margin-bottom: 100px;
            margin-left: 80px;
            background-color: lightblue;
        }
        p{
            width: 300px;
            border: 1px solid red;
            margin: auto;
        }
    </style>
</head>
<body>
   <h2>Usando propriedades individuais de margem</h2>
   <div>
    Este elemento div tem uma margem de cima de 100px, direita de 150px, de baixo igual a 100px e da esquerda de 80px.
   </div>
   <br>
   <h3>Configurando Margin Auto</h3>
   <p>Esse parágrafo tem margin auto</p> 
</body>
</html>
