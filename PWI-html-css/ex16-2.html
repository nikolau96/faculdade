<!DOCTYPE html>
<html>
<head>
    <style>
        h3{
            background-color: green;
        }
        div{
            background-color: lightblue;
        }
        p{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h3>Exemplo de CSS para background-color</h3>
    <div>
        Esse é um texto dentro de uma div
        <p>Esse parágrafo tem a sua própria cor de fundo</p>
        Aqui ainda está dentro da div
    </div>
</body>
</html>
